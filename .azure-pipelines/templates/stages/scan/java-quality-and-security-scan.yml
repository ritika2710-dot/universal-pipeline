parameters:
  - name: javaVersion
    type: string
    default: '17'

  - name: buildTool
    type: string
    default: 'maven'   # maven | gradle

# SonarQube Parameters
  - name: sonarQubeServiceConnection
    type: string
    default: ''

  - name: sonarQubeProjectKey
    type: string
    default: ''

  - name: sonarQubeUrl
    type: string
    default: ''

  - name: sonarQubeToken
    type: string
    default: ''

  - name: sonarReportArtifactName
    type: string
    default: 'SonarQube-Reports'

  - name: branchName
    type: string
    default: $(Build.SourceBranch)

  - name: branchFilter
    type: string
    default: 'refs/heads/main'

  - name: coverageReportPath
    type: string
    default: 'target/site/jacoco/jacoco.xml'

  - name: testResultsPath
    type: string
    default: '**/surefire-reports/TEST-*.xml'

# Wiz Parameters
  - name: wizClientId
    type: string
    default: ''

  - name: wizClientSecret
    type: string
    default: ''

  - name: wizServiceConnection
    type: string
    default: ''

  - name: wizScanPolicies
    type: string
    default: 'Fail-on-Medium-Vulns, Default vulnerabilities policy'

  - name: wizFailOnSeverity
    type: string
    default: 'Medium'

  - name: wizPolicyHitsOnly
    type: boolean
    default: false

  - name: wizSucceedOnFailures
    type: boolean
    default: false

  - name: wizContainerSucceedOnFailures
    type: boolean
    default: false

  - name: wizContainerimage
    type: string
    default: ''

  - name: wizContainerpolicyHitsOnly
    type: boolean
    default: true

  - name: wizContainerfileHashesScan
    type: boolean
    default: true

# Containerized Application
  - name: isContainerized
    type: boolean
    default: false

  - name: Dockerfile
    type: string
    default: '**/Dockerfile'

  - name: dockerBuildContext
    type: string
    default: '.'

  - name: dockerRepository
    type: string
    default: ''

  - name: dockerTags
    type: string
    default: 'latest'


stages:
- stage: CodeQualityStage
  displayName: "Stage 3 - Code Quality & Security (Java)"
  variables:
    - name: sonarReportFilenamePR
      value: 'SonarScan-PR-$(System.PullRequest.PullRequestId).pdf'
    - name: sonarReportFilenameBuild
      value: 'SonarScan-Build-$(Build.BuildId).pdf'

  jobs:
  - job: JavaQualityAndSecurity
    displayName: 'Java Quality, Coverage, Sonar & Wiz'
    steps:

    # Step 1: Use Java
    - task: JavaToolInstaller@0
      displayName: Use Java ${{ parameters.javaVersion }}
      inputs:
        versionSpec: ${{ parameters.javaVersion }}
        jdkArchitectureOption: 'x64'

    # Step 2: Build + Test (Maven / Gradle)
    - script: |
        set +e
        if [ "${{ parameters.buildTool }}" = "maven" ]; then
          mvn -B clean verify || exit_code=$?
        else
          ./gradlew clean test jacocoTestReport || exit_code=$?
        fi

        if [ "${exit_code:-0}" -ne 0 ]; then
          echo "Build or tests failed"
          exit ${exit_code}
        fi
      displayName: 'Build & Test with Coverage'

    # Step 3: Publish Test Results
    - task: PublishTestResults@2
      displayName: 'Publish Test Results'
      condition: succeededOrFailed()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: ${{ parameters.testResultsPath }}

    # Step 4: Publish Code Coverage
    - task: PublishCodeCoverageResults@2
      displayName: 'Publish Code Coverage'
      condition: succeededOrFailed()
      inputs:
        codeCoverageTool: 'JaCoCo'
        summaryFileLocation: ${{ parameters.coverageReportPath }}

    # Step 5: SonarQube Prepare
    - task: SonarQubePrepare@7
      displayName: 'Prepare SonarQube'
      inputs:
        SonarQube: ${{ parameters.sonarQubeServiceConnection }}
        scannerMode: 'CLI'
        configMode: 'manual'
        cliProjectKey: ${{ parameters.sonarQubeProjectKey }}
        extraProperties: |
          sonar.projectVersion=1.0
          sonar.sources=.
          sonar.language=java
          sonar.sourceEncoding=UTF-8
          sonar.exclusions=**/target/**,**/build/**
          sonar.java.binaries=target/classes
          sonar.coverage.jacoco.xmlReportPaths=${{ parameters.coverageReportPath }}

    # Step 6: Sonar Analyze
    - task: SonarQubeAnalyze@7
      displayName: 'Run SonarQube Analysis'

    # Step 7: Sonar Publish
    - task: SonarQubePublish@7
      displayName: 'Publish SonarQube Quality Gate'
      inputs:
        pollingTimeoutSec: '300'

    # Step 8: Wiz Directory Scan
    - task: wiz@0
      displayName: 'Wiz Directory Scan'
      inputs:
        command: 'dir'
        clientid: ${{ parameters.wizClientId }}
        secret: ${{ parameters.wizClientSecret }}
        failOnSeverity: ${{ parameters.wizFailOnSeverity }}
        policyHitsOnly: ${{ parameters.wizPolicyHitsOnly }}
        succeedOnFailures: ${{ parameters.wizSucceedOnFailures }}
        scanPolicies: ${{ parameters.wizScanPolicies }}
        path: '.'
        useServiceConnection: true
        serviceConnectionId: ${{ parameters.wizServiceConnection }}

    # Step 9: Docker Build (Optional)
    - ${{ if eq(parameters.isContainerized, true) }}:
      - task: Docker@2
        displayName: 'Docker Build'
        inputs:
          command: 'build'
          dockerfile: ${{ parameters.Dockerfile }}
          repository: ${{ parameters.dockerRepository }}
          buildContext: ${{ parameters.dockerBuildContext }}
          tags: |
            ${{ parameters.dockerTags }}

    # Step 10: Wiz Container Scan (Optional)
    - ${{ if eq(parameters.isContainerized, true) }}:
      - task: wiz@0
        displayName: 'Wiz Container Image Scan'
        inputs:
          command: 'image'
          clientid: ${{ parameters.wizClientId }}
          secret: ${{ parameters.wizClientSecret }}
          image: ${{ parameters.wizContainerimage }}
          succeedOnFailures: ${{ parameters.wizContainerSucceedOnFailures }}
          policyHitsOnly: ${{ parameters.wizContainerpolicyHitsOnly }}
          fileHashesScan: ${{ parameters.wizContainerfileHashesScan }}
          sudo: true
