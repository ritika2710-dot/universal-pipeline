# templates/release-tag.yml
parameters:
  - name: stageName
    type: string
    default: 'ReleaseStage'

  - name: displayName
    type: string
    default: 'Stage - Release Tag and Artifact'

  - name: releaseType
    type: string
    default: 'patch'

#  - name: dependsOn
#    type: string
#    default: 'ManualApprovalStage1'

  # - name: allowedUsers
  #   type: string
  #   default: ''

  - name: releaseBranch
    type: string
    default: 'main'

  - name: universalFeedNameApp
    type: string
    default: ''

  - name: universalPackageName
    type: string
    default: 'App'
  
  - name: packageDescription
    type: string
    default: 'Application Artifact'

  - name: gitUserName
    type: string
    default: 'Azure DevOps Build Service'

  - name: gitUserEmail
    type: string
    default: 'ado-build-service-bot@unilever.com'

  - name: isContainerized
    type: boolean
    default: false

  # ACR / container settings (used when artifactType = 'container')
  - name: acrServiceConnection
    type: string
    default: '' # Azure DevOps service connection to ACR

  - name: acrRepository
    type: string
    default: '' # e.g. myregistry.azurecr.io/myapp

  - name: acrDockerfilePath
    type: string
    default: '$(Pipeline.Workspace)/build/Build-Drop/Dockerfile'

  - name: acrContextPath
    type: string
    default: '$(Pipeline.Workspace)/build/Build-Drop'

stages:
- stage: ${{ parameters.stageName }}
  displayName: ${{ parameters.displayName }}
#  dependsOn: ${{ parameters.dependsOn }}
  jobs:
    - job: ReleaseJob
      displayName: "Tag Release and Artifact Publish"
      steps:
        - checkout: self
          persistCredentials: true
          fetchTags: true

        # - script: |
        #     echo "Validating user who triggered the pipeline..."

        #     REQUESTED_USER="$(Build.RequestedFor)"
        #     echo "Triggered by: $REQUESTED_USER"
        #     echo $ALLOWED_USERS_LIST

        #     #ALLOWED_USERS=(${ALLOWED_USERS_LIST})
        #     ALLOWED_USERS=($ALLOWED_USERS_LIST)
        #     IS_ALLOWED=false
        #     for user in "${ALLOWED_USERS[@]}"; do
        #       if [[ "$REQUESTED_USER" == "$user" ]]; then
        #         IS_ALLOWED=true
        #         echo $user
        #         break
        #       fi
        #     done

        #     if [[ "$IS_ALLOWED" != "true" ]]; then
        #       echo "ERROR: User '$REQUESTED_USER' is not authorized to run this pipeline."
        #       exit 1
        #     fi

        #     echo "User '$REQUESTED_USER' is authorized."
        #   displayName: 'Validate Triggering User'
        #   env:
        #     ALLOWED_USERS_LIST: "${{ join(parameters.allowedUsers, ' ') }}"

        - script: |
            echo "Getting the latest valid semantic version tag..."

            git fetch --tags

            LATEST_TAG=""
            for tag in $(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$'); do
              VERSION="${tag#v}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
              if [ "$PATCH" -lt 1000 ]; then
                LATEST_TAG=$tag
                break
              fi
            done

            echo "Latest valid tag: $LATEST_TAG"

            if [ -z "$LATEST_TAG" ]; then
              MAJOR=0
              MINOR=0
              PATCH=0
            else
              VERSION="${LATEST_TAG#v}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            fi

            echo "Current version: $MAJOR.$MINOR.$PATCH"

            # Determine what to bump (default = patch)
            RELEASE_TYPE="${RELEASE_TYPE:-patch}"
            echo "Version bump type: $RELEASE_TYPE"

            case "$RELEASE_TYPE" in
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              patch)
                PATCH=$((PATCH + 1))
                ;;
              *)
                echo "Invalid RELEASE_TYPE value: $RELEASE_TYPE"
                exit 1
                ;;
            esac

            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            NEW_TAG="v${NEW_VERSION}"

            echo "New tag: $NEW_TAG"
            echo "New version: $NEW_VERSION"

            echo "##vso[task.setvariable variable=new_tag;isOutput=true]$NEW_TAG"
            echo "##vso[task.setvariable variable=new_version;isOutput=true]$NEW_VERSION"
          name: calversion
          displayName: "Auto-calculate New Semantic Version"
          env:
            RELEASE_TYPE: ${{ parameters.releaseType }}


        - script: |
            echo "Configuring Git user..."
            git config user.name "${{ parameters.gitUserName }}"
            git config user.email "${{ parameters.gitUserEmail }}"

            echo "Fetching branch..."
            git fetch origin ${{ parameters.releaseBranch }}
            git checkout ${{ parameters.releaseBranch }}
            git pull origin ${{ parameters.releaseBranch }}

            echo "Checking for existing tag..."
            git fetch --tags
            echo "Creating annotated tag: $(calversion.new_tag)"
            git tag -a "$(calversion.new_tag)" -m "Release $(calversion.new_tag)"

            echo "Pushing tag to origin..."
            git push origin $(calversion.new_tag)
          displayName: "Create and Push New Git Tag in ADO Repo"
        
        
        # Download the previously published build artifact
        - task: DownloadBuildArtifacts@0
          displayName: 'Download Build Artifact'
          inputs:
            buildType: 'current'
            downloadType: 'single'
            artifactName: 'Build-Drop'
            downloadPath: '$(Pipeline.Workspace)/build'

        # Universal package flow (default)
        - bash: |
            set -euo pipefail
            PUBLISH_DIR="$(Build.ArtifactStagingDirectory)/upack"
            rm -rf "$PUBLISH_DIR"
            mkdir -p "$PUBLISH_DIR"

            # Move/copy the zip (or your app folder) into publish dir
            # Assuming your build published a ZIP named $(Build.SourceVersion).zip in the artifact
            SRC_ZIP="$(Pipeline.Workspace)/build/Build-Drop/$(Build.SourceVersion).zip"
            if [ ! -f "$SRC_ZIP" ]; then
              echo "Could not find $SRC_ZIP. Listing for debugging:"
              find "$(Pipeline.Workspace)/build" -maxdepth 3 -type f -print
              exit 1
            fi

            cp "$SRC_ZIP" "$PUBLISH_DIR/"
            # Including a readme for traceability
            echo "commit=$(Build.SourceVersion)" > "$PUBLISH_DIR/readme-ci-cd.txt"
            echo "tag=$(calversion.new_tag)" >> "$PUBLISH_DIR/readme-ci-cd.txt"
          displayName: 'Stage contents for Universal Package'

        - task: UniversalPackages@0
          displayName: 'Publish Pipeline Logs Universal Package'
          inputs:
            command: 'publish'
            publishDirectory: '$(Build.ArtifactStagingDirectory)/upack'
            feedsToUse: 'internal' #Internal to Organization
            vstsFeedPublish: '${{ parameters.universalFeedNameApp }}'
            vstsFeedPackagePublish: '${{ parameters.universalPackageName }}'
            versionOption: 'custom'
            versionPublish: '$(calversion.new_version)'
            packagePublishDescription: '${{ parameters.packageDescription }}'
