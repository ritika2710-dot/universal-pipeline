#/stages/validation/branch-name-validation.yml
parameters:
  - name: stageName
    type: string
    default: 'EnforceBranchNamingStage'

  - name: displayName
    type: string
    default: 'Stage - Enforce Branch Naming (PRs Only)'

  - name: jobName
    type: string
    default: 'EnforceBranchNaming'

  - name: jobDisplayName
    type: string
    default: 'Validate Branch Naming Convention'

  - name: branchRegex
    type: string
    default: '^(develop|feature|bugfix|hotfix|release)/.+$'

stages:
  - stage: ${{ parameters.stageName }}
    displayName: ${{ parameters.displayName }}
    condition: eq(variables['Build.Reason'], 'PullRequest')
    jobs:
      - job: ${{ parameters.jobName }}
        displayName: ${{ parameters.jobDisplayName }}
        steps:
          - bash: |

              set -euo pipefail

              echo "Build.SourceBranch: $(Build.SourceBranch)"
              echo "PR Source: $(System.PullRequest.SourceBranch)"
              echo "PR Target: $(System.PullRequest.TargetBranch)"

              src_branch="$(System.PullRequest.SourceBranch)"
              tgt_branch="$(System.PullRequest.TargetBranch)"

              # Normalize (strip refs/heads/)
              src_branch="${src_branch#refs/heads/}"
              tgt_branch="${tgt_branch#refs/heads/}"

              echo "Normalized Source: $src_branch"
              echo "Normalized Target: $tgt_branch"

              # Quick sanity checks
              if [ -z "$src_branch" ] || [ -z "$tgt_branch" ]; then
                echo "Missing PR branch info. Ensure this stage runs only for PRs."
                exit 1
              fi

              # Allowed patterns:
              # 1) feature/* -> develop
              if [[ "$src_branch" =~ ^feature\/.+$ && "$tgt_branch" == "develop" ]]; then
                echo "Allowed: feature/* -> develop"
                exit 0
              fi

              # 2) develop -> main
              if [[ "$src_branch" == "develop" && "$tgt_branch" == "main" ]]; then
                echo "Allowed: develop -> main"
                exit 0
              fi

              # 3) hotfix/* -> main
              if [[ "$src_branch" =~ ^hotfix\/.+$ && "$tgt_branch" == "main" ]]; then
                echo "Allowed: hotfix/* -> main"
                exit 0
              fi

              # 4) hotfix/* -> develop
              if [[ "$src_branch" =~ ^hotfix\/.+$ && "$tgt_branch" == "develop" ]]; then
                echo "Allowed: hotfix/* -> develop"
                exit 0
              fi

              # 5) main -> develop (backport after release)
              if [[ "$src_branch" == "main" && "$tgt_branch" == "develop" ]]; then
                echo "Allowed: main -> develop"
                exit 0
              fi

              echo "INVALID PR MERGE:"
              echo "Source: $src_branch"
              echo "Target: $tgt_branch"
              echo "Allowed:"
              echo "  - feature/*   -> develop"
              echo "  - develop     -> main"
              echo "  - hotfix/*    -> main"
              echo "  - hotfix/*    -> develop"
              echo "  - main        -> develop"
              exit 1
            displayName: 'Validate allowed PR source → target rules'
