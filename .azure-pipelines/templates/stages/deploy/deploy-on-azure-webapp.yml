parameters:
  - name: stageName
    type: string
    default: 'Deploy'

  - name: stageDisplayName
    type: string
    default: 'Deploy to Azure Web App'

  - name: dependsOn
    type: string
    default: 'ReleaseStage'

  - name: jobName
    type: string
    default: 'DeployWebApp'

  - name: jobDisplayName
    type: string
    default: 'Deploy Azure Web App'

  - name: environment
    type: string
    default: ''

  - name: azureSubscription
    type: string
    default: ''

  - name: resourceGroupName
    type: string
    default: ''

  - name: appName
    type: string
    default: ''

  - name: appOs             # windows | linux
    type: string
    default: 'linux'

  - name: artifactName
    type: string
    default: 'Build-Drop'

  - name: packagePath
    type: string
    default: '$(Pipeline.Workspace)/Build-Drop/$(Build.SourceVersion).zip'

  - name: universalFeedNameApp
    type: string
    default: ''

  - name: universalPackageName
    type: string
    default: ''

  - name: universalPackageVersion
    type: string
    default: ''

  - name: stageDependsOnRelease
    type: boolean
    default: false

stages:
- stage: ${{ parameters.stageName }}
  displayName: ${{ parameters.stageDisplayName }}
  ${{ if eq(parameters.stageDependsOnRelease, true) }}:
    dependsOn:
      - ReleaseStage
      - ${{ parameters.dependsOn }}
  ${{ if eq(parameters.stageDependsOnRelease, false) }}:
    dependsOn: ${{ parameters.dependsOn }}

  jobs:
  - deployment: ${{ parameters.jobName }}
    displayName: ${{ parameters.jobDisplayName }}
    environment: ${{ parameters.environment }}

    variables:
      - name: universalPackageVersion
        value: $[ stageDependencies.ReleaseStage.ReleaseJob.outputs['calversion.new_version'] ]

    strategy:
      runOnce:
        deploy:
          steps:

          # set default package path variable (can be overridden by universal download)
          - bash: |
              echo "##vso[task.setvariable variable=downloadedPackagePath]${{ parameters.packagePath }}"
            displayName: 'Set default package path'

          # Allow template param to override, otherwise use runtime ReleaseStage output
          - bash: |
              if [ -n '${{ parameters.universalPackageVersion }}' ]; then
                echo "Overriding universalPackageVersion with template parameter: ${{ parameters.universalPackageVersion }}"
                echo "##vso[task.setvariable variable=universalPackageVersion]${{ parameters.universalPackageVersion }}"
              else
                echo "Using runtime ReleaseStage output for universalPackageVersion: $(universalPackageVersion)"
              fi
            displayName: 'Determine Universal Package Version'

          # Optionally download from Universal Packages feed when parameters provided
          - task: DownloadPackage@1
            displayName: 'Download Universal Package from feed'
            inputs:
              packageType: 'upack'
              feed: '${{ parameters.universalFeedNameApp }}'
              definition: '${{ parameters.universalPackageName }}'
              version: '$(universalPackageVersion)'
              downloadPath: '$(Pipeline.Workspace)/upack'

          - bash: |
              set -euo pipefail
              FILE=$(find "$(Pipeline.Workspace)/upack" -type f -name '*.zip' -print -quit || true)
              if [ -z "$FILE" ]; then
                echo "No zip file found in downloaded package; setting package path to folder"
                echo "##vso[task.setvariable variable=downloadedPackagePath]$(Pipeline.Workspace)/upack"
              else
                echo "Found package: $FILE"
                echo "##vso[task.setvariable variable=downloadedPackagePath]$FILE"
              fi
            displayName: 'Resolve downloaded package path'
          # Download promoted artifact (pipeline artifact fallback)
          - download: current
            artifact: ${{ parameters.artifactName }}
            displayName: Download Artifact

          # ============================
          # Windows Web App
          # ============================
          - task: AzureWebApp@1
            displayName: Deploy Windows Web App
            condition: eq('${{ parameters.appOs }}', 'windows')
            inputs:
              azureSubscription: ${{ parameters.azureSubscription }}
              resourceGroupName: ${{ parameters.resourceGroupName }}
              appType: 'webApp'
              appName: ${{ parameters.appName }}
              package: '$(downloadedPackagePath)'

          # ============================
          # Linux Web App
          # ============================
          - task: AzureWebApp@1
            displayName: Deploy Linux Web App
            condition: eq('${{ parameters.appOs }}', 'linux')
            inputs:
              azureSubscription: ${{ parameters.azureSubscription }}
              resourceGroupName: ${{ parameters.resourceGroupName }}
              appType: 'webAppLinux'
              appName: ${{ parameters.appName }}
              package: '$(downloadedPackagePath)'
