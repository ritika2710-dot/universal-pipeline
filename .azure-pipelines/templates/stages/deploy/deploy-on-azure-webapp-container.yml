parameters:
  - name: stageName
    type: string
    default: 'Deploy'

  - name: stageDisplayName
    type: string
    default: 'Deploy to Azure Web App'

  - name: dependsOn
    type: string
    default: 'ReleaseStage'

  - name: stageDependsOnRelease
    type: boolean
    default: false

  - name: jobName
    type: string
    default: 'DeployWebApp'

  - name: jobDisplayName
    type: string
    default: 'Deploy Azure Web App'

  - name: environment
    type: string
    default: ''

  - name: azureSubscription
    type: string
    default: ''

  - name: resourceGroupName
    type: string
    default: ''

  - name: appName
    type: string
    default: ''

  - name: appOs             # windows | linux
    type: string
    default: 'linux'

  - name: artifactName
    type: string
    default: 'Build-Drop'

  # Container deployment parameters
  - name: deploymentMethod
    type: string
    default: 'single-container'  # Options: 'sidecar', 'single-container', 'multi-container'

  - name: serviceConnectionAppService
    type: string
    default: ''

  - name: containerRegistry
    type: string
    default: ''

  - name: imageName
    type: string
    default: ''

  - name: imageTag
    type: string
    default: 'latest'
  
  - name: prodImageTag
    type: string
    default: ''

  - name: sidecarContainerName
    type: string
    default: 'main'

  - name: sidecarTargetPort
    type: number
    default: 5000

  - name: isSidecarMain
    type: boolean
    default: true

  - name: dockerComposeFile
    type: string
    default: ''

  - name: appSettings
    type: object
    default: {}

  - name: configurationStrings
    type: object
    default: {}
  - name: siteContainersConfig
    type: object
    default: {}
  - name: slotName
    type: string
    default: ''
  - name: deployToSlotOrASE
    type: boolean
    default: false
  - name: containerCommand
    type: string
    default: ''
  - name: isProdDeployment
    type: string 
    default: 'false' # 'true' or 'false'



stages:
- stage: ${{ parameters.stageName }}
  displayName: ${{ parameters.stageDisplayName }}
  ${{ if eq(parameters.stageDependsOnRelease, true) }}:
    dependsOn:
      - ReleaseStage
      - ${{ parameters.dependsOn }}
  ${{ if eq(parameters.stageDependsOnRelease, false) }}:
    dependsOn: ${{ parameters.dependsOn }}

  jobs:
  - deployment: ${{ parameters.jobName }}
    displayName: ${{ parameters.jobDisplayName }}
    environment: ${{ parameters.environment }}
    # variables:
    
    #   ${{ if and(eq(parameters.isProdDeployment, 'true'), ne(parameters.prodImageTag, '')) }}:
    #         imageTag: "${{ parameters.prodImageTag }}"
    #   ${{ if ne(parameters.isProdDeployment, 'true') }}:
    #         imageTag: "$[ stageDependencies.ReleaseStage.ReleaseJob.outputs['calversion.new_version'] ]"
    #   ${{ if and(eq(parameters.isProdDeployment, 'true'), eq(parameters.prodImageTag, '')) }}:
    #         imageTag: "null"

    strategy:
      runOnce:
        deploy:
          steps:

          - bash: |
              set -e
              
              echo "isProdDeployment='${{ parameters.isProdDeployment }}' prodImageTag='${{ parameters.prodImageTag }}'"

              if [ "${{ parameters.isProdDeployment }}" = "true" ]; then
                if [ -z "${{ parameters.prodImageTag }}" ]; then
                  echo "ERROR: Production deployment selected but 'prodImageTag' is empty."
                  exit 1
                fi
                TAG="${{ parameters.prodImageTag }}"
              else
                TAG="$[ stageDependencies.ReleaseStage.ReleaseJob.outputs['calversion.new_version'] ]"
                if [ -z "$TAG" ]; then
                  # optional fallback if this stage sometimes doesn't depend on ReleaseStage
                  TAG="latest"
                fi
              fi
              
              echo "Resolved imageTag='$TAG'"
              echo "##vso[task.setvariable variable=imageTag]$TAG"


              # echo "Resolved imageTag = '$(imageTag)'"
              # if [ "$(imageTag)" = "null" ] || [ -z "$(imageTag)" ]; then
              #   echo "ERROR: Production deployment selected but prodImageTag was not provided."
              #   exit 1
              # fi
            displayName: "Validate imageTag (must not be 'null')"

          # ============================
          # SIDECAR DEPLOYMENT
          # ============================
          - ${{ if eq(parameters.deploymentMethod, 'sidecar') }}:
            - task: AzureCLI@2
              displayName: 'Deploy Sidecar Container to App Service'
              inputs:
                azureSubscription: ${{ parameters.serviceConnectionAppService }}
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  az webapp sitecontainers update \
                    --name ${{ parameters.appName }} \
                    --resource-group ${{ parameters.resourceGroupName }} \
                    --container-name ${{ parameters.sidecarContainerName }} \
                    --image ${{ parameters.containerRegistry }}/${{ parameters.imageName }}:$(imageTag) \
                    --target-port ${{ parameters.sidecarTargetPort }} \
                    --is-main ${{ parameters.isSidecarMain }}

          # ============================
          # SINGLE CONTAINER DEPLOYMENT
          # ============================
          - ${{ if eq(parameters.deploymentMethod, 'single-container') }}:
            - task: Bash@3
              displayName: 'Echo Deployment Info'
              inputs:
                targetType: 'inline'
                script: |
                  echo "Deploying to Azure Web App: ${{ parameters.appName }}"
                  echo "serviceConnectionAppService: ${{ parameters.serviceConnectionAppService }}"
                  echo "Container Image: ${{ parameters.containerRegistry }}/${{ parameters.imageName }}:$(imageTag)" 
            - task: AzureWebAppContainer@1
              displayName: 'Deploy Single Container to App Service'
              inputs:
                azureSubscription: ${{ parameters.serviceConnectionAppService }}
                appName: ${{ parameters.appName }}
                deployToSlotOrASE:  ${{ parameters.deployToSlotOrASE }}
                resourceGroupName: ${{ parameters.resourceGroupName }}
                slotName:  ${{ parameters.slotName }}
                containers: ${{ parameters.containerRegistry }}/${{ parameters.imageName }}:$(imageTag)
                containerCommand: ${{ parameters.containerCommand }}                
                # appSettings: ${{ parameters.appSettings }}
                # configurationStrings: ${{ parameters.configurationStrings }}
                # siteContainersConfig: ${{ parameters.siteContainersConfig }}

          # ============================
          # MULTI-CONTAINER DEPLOYMENT
          # ============================
          - ${{ if eq(parameters.deploymentMethod, 'multi-container') }}:
            - task: DownloadPipelineArtifact@2
              displayName: 'Download Pipeline Artifact (Docker Compose)'
              inputs:
                buildType: 'current'
                artifactName: ${{ parameters.artifactName }}
                targetPath: '$(Pipeline.Workspace)/build'

            - task: AzureWebAppContainer@1
              displayName: 'Deploy Multi-Container App Service (Docker Compose)'
              inputs:
                azureSubscription: ${{ parameters.serviceConnectionAppService }}
                appName: ${{ parameters.appName }}
                resourceGroupName: ${{ parameters.resourceGroupName }}
                multicontainerConfigFile: ${{ parameters.dockerComposeFile }}
