# templates/stages/deploy/deploy-on-azure-functions.yaml

parameters:
  - name: stageName
    type: string
    default: 'Deploy'

  - name: stageDisplayName
    type: string
    default: 'Deploy to Azure Function App'

  - name: dependsOnStage
    type: string
    default: 'ManualApprovalStage1'

  - name: condition
    type: string
    default: "succeeded('ManualApprovalStage1')"

  - name: jobName
    type: string
    default: 'DeployFunctionApp'

  - name: jobDisplayName
    type: string
    default: 'Deploy Azure Function App'

  - name: environment
    type: string
    default: ''

  - name: azureSubscription
    type: string
    default: ''

  - name: resourceGroupName
    type: string
    default: ''

  - name: appType
    type: string
    default: 'functionAppLinux'

  - name: appName
    type: string
    default: ''

  - name: artifactName
    type: string
    default: 'Build-Drop'

  - name: packagePath
    type: string
    default: '$(Build.ArtifactStagingDirectory)/$(Build.SourceVersion).zip'

  - name: dependsOn
    type: string
    default: 'ReleaseStage'

  - name: universalFeedNameApp
    type: string
    default: ''

  - name: universalPackageName
    type: string
    default: ''

  - name: universalPackageVersion
    type: string
    default: ''

  - name: stageDependsOnRelease
    type: boolean
    default: false

stages:
- stage: ${{ parameters.stageName }}
  displayName: '${{ parameters.stageDisplayName }}'
  ${{ if eq(parameters.stageDependsOnRelease, true) }}:
    dependsOn:
      - ReleaseStage
      - ${{ parameters.dependsOn }}
  ${{ if eq(parameters.stageDependsOnRelease, false) }}:
    dependsOn: ${{ parameters.dependsOn }}
  jobs:
  - deployment: ${{ parameters.jobName }}
    displayName: '${{ parameters.jobDisplayName }}'
    environment: '${{ parameters.environment }}'
    variables:
      universalPackageVersion: $[ stageDependencies.ReleaseStage.ReleaseJob.outputs['calversion.new_version'] ]
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadPipelineArtifact@2
            displayName: 'Download Pipeline Artifact'
            inputs:
              buildType: 'current'
              artifactName: ${{ parameters.artifactName }}
              targetPath: '$(Pipeline.Workspace)/build'

          - task: Bash@3
            displayName: 'Resolve Package Version'
            inputs:
              targetType: inline
              script: |
                # Get resolved version from job variable (from ReleaseStage outputs)
                VERSION='$(universalPackageVersion)'
                
                # Override with parameter if provided
                if [ ! -z "${{ parameters.universalPackageVersion }}" ]; then
                  VERSION='${{ parameters.universalPackageVersion }}'
                fi
                
                echo "##vso[task.setvariable name=resolvedPackageVersion]$VERSION"
                echo "Package Version: $VERSION"

          - task: DownloadPackage@1
            displayName: 'Download Universal Package'
            condition: and(ne('${{ parameters.universalFeedNameApp }}', ''), ne('${{ parameters.universalPackageName }}', ''))
            inputs:
              packageType: 'upack'
              feed: ${{ parameters.universalFeedNameApp }}
              definition: ${{ parameters.universalPackageName }}
              version: $(resolvedPackageVersion)
              downloadPath: '$(Pipeline.Workspace)/package'

          - task: Bash@3
            displayName: 'Resolve Downloaded Package Path'
            condition: and(ne('${{ parameters.universalFeedNameApp }}', ''), ne('${{ parameters.universalPackageName }}', ''))
            inputs:
              targetType: inline
              script: |
                # Find ZIP file in downloaded package and resolve path for deployment
                PACKAGE_PATH=$(find $(Pipeline.Workspace)/package -name "*.zip" -type f | head -1)
                if [ -z "$PACKAGE_PATH" ]; then
                  echo "No package ZIP found in $(Pipeline.Workspace)/package"
                  PACKAGE_PATH="${{ parameters.packagePath }}"
                fi
                echo "##vso[task.setvariable name=downloadedPackagePath]$PACKAGE_PATH"
                echo "Resolved package path: $PACKAGE_PATH"

          - task: AzureFunctionApp@1
            displayName: 'Deploy Azure Function App'
            inputs:
              azureSubscription: ${{ parameters.azureSubscription }}
              appType: ${{ parameters.appType }}
              appName: ${{ parameters.appName }}
              package: $(downloadedPackagePath)
