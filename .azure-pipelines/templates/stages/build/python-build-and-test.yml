# python-build-and-test.yml
parameters:
  - name: pythonVersion
    type: string
    default: '3.11'

  - name: requirementsFile
    type: string
    default: 'requirements.txt'

  - name: coverageReportPath
    type: string
    default: 'coverage.xml'

  - name: testResultsPath
    type: string
    default: 'junit/test-results.xml'

  - name: archiveFileName
    type: string
    default: '$(Build.ArtifactStagingDirectory)/$(Build.SourceVersion).zip'

  - name: artifactName
    type: string
    default: 'Build-Drop'

  - name: projectPath
    type: string
    default: '.'
    # Path to the project root where requirements.txt is located

  - name: archiveSourcePath
    type: string
    default: '.'

  - name: archiveExclusions
    type: object
    default:
      - '**/.azure-pipelines/**'
      - '**/.github/**'
      - '**/.git/**'
      - '**/__pycache__/**'
      - '**/*.pyc'
      - '**/.pytest_cache/**'
      - '**/.coverage'
      - '**/venv/**'
      - '**/node_modules/**'

  - name: isContainerized
    type: boolean
    default: false

  - name: Dockerfile
    type: string
    default: '**/Dockerfile'

  - name: dockerBuildContext
    type: string
    default: '.'

  - name: dockerTags
    type: string
    default: 'latest'


stages:
- stage: BuildStage
  displayName: "Stage 2 - Build & Test"
  jobs:
  - job: BuildJob
    displayName: Build & Test
    steps:
    - checkout: self
      fetchDepth: 1

    - task: UsePythonVersion@0
      displayName: Use Python ${{ parameters.pythonVersion }}
      inputs:
        versionSpec: ${{ parameters.pythonVersion }}

    - task: Bash@3
      displayName: Install dependencies into site_packages
      inputs:
        targetType: inline
        script: |
          set -e
          PROJECT_PATH="${{ parameters.projectPath }}"
          REQUIREMENTS_FILE="$PROJECT_PATH/${{ parameters.requirementsFile }}"
          SITE_PACKAGES_DIR="$PROJECT_PATH/site_packages"
          rm -rf "$SITE_PACKAGES_DIR"
          mkdir -p "$SITE_PACKAGES_DIR"
          python -m pip install --upgrade pip
          echo "Installing dependencies from: $REQUIREMENTS_FILE into $SITE_PACKAGES_DIR"
          if [ -f "$REQUIREMENTS_FILE" ]; then
            python -m pip install -r "$REQUIREMENTS_FILE" -t "$SITE_PACKAGES_DIR"
          else
            echo "ERROR: Requirements file not found at $REQUIREMENTS_FILE"
            exit 1
          fi

    - bash: |
        # expose filenames for Publish tasks (basename evaluated by shell)
        testResultsFileName=$(basename "${{ parameters.testResultsPath }}")
        coverageFileName=$(basename "${{ parameters.coverageReportPath }}")
        echo "##vso[task.setvariable variable=testResultsFileName]$testResultsFileName"
        echo "##vso[task.setvariable variable=coverageFileName]$coverageFileName"
      displayName: 'Set test and coverage filenames'

    - task: Bash@3
      displayName: Run Pytest with Coverage (gracefully handle no tests)
      inputs:
        targetType: inline
        script: |
          set -e
          PROJECT_PATH="${{ parameters.projectPath }}"
          SITE_PACKAGES_DIR="$PROJECT_PATH/site_packages"
          mkdir -p "$(Build.ArtifactStagingDirectory)"
          if [ ! -d "$PROJECT_PATH/venv" ]; then
            python3 -m venv "$PROJECT_PATH/venv"
          fi
          source "$PROJECT_PATH/venv/bin/activate"
          pip install pytest pytest-cov
          echo "Running pytest from $PROJECT_PATH with PYTHONPATH=$SITE_PACKAGES_DIR"
          PYTHONPATH="$SITE_PACKAGES_DIR:$PYTHONPATH" pytest -q --junitxml="$(Build.ArtifactStagingDirectory)/$(testResultsFileName)" \
            --cov="$PROJECT_PATH" --cov-report=xml:"$(Build.ArtifactStagingDirectory)/$(coverageFileName)" || exit_code=$?
          if [ "${exit_code:-0}" -eq 5 ]; then
            echo "No tests collected"
            echo '<testsuite name="no-tests" tests="0" errors="0" failures="0" skipped="0"></testsuite>' > "$(Build.ArtifactStagingDirectory)/$(testResultsFileName)"
            echo '<?xml version="1.0"?><coverage></coverage>' > "$(Build.ArtifactStagingDirectory)/$(coverageFileName)"
          elif [ "${exit_code:-0}" -ne 0 ]; then
            echo "Pytest failed with exit code ${exit_code}"
            exit ${exit_code}
          fi

    - task: PublishTestResults@2
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '$(Build.ArtifactStagingDirectory)/$(testResultsFileName)'
        failTaskOnFailedTests: true
      condition: succeededOrFailed()
      displayName: 'Publish Test Results to Azure DevOps'

    - task: PublishCodeCoverageResults@2
      inputs:
        codeCoverageTool: 'Cobertura'
        summaryFileLocation: '$(Build.ArtifactStagingDirectory)/$(coverageFileName)'
      condition: succeededOrFailed()
      displayName: 'Publish Code Coverage to Azure DevOps'

    - task: Bash@3
      displayName: 'Collect test and coverage artifacts (ensure names)'
      inputs:
        targetType: inline
        script: |
          mkdir -p "$(Build.ArtifactStagingDirectory)"
          echo "Artifacts in $(Build.ArtifactStagingDirectory):"
          ls -la "$(Build.ArtifactStagingDirectory)" || true

    - task: Bash@3
      displayName: 'Copy app files into site_packages folder'
      inputs:
        targetType: inline
        script: |
          set -e
          PROJECT_PATH="${{ parameters.projectPath }}"
          SITE_PACKAGES_DIR="$PROJECT_PATH/site_packages"
          echo "Copying app files from $PROJECT_PATH into $SITE_PACKAGES_DIR"
          # Copy all app files except unwanted directories
          rsync -av --exclude='site_packages' --exclude='.venv' --exclude='venv' --exclude='.git' --exclude='__pycache__' --exclude='.pytest_cache' "$PROJECT_PATH/" "$SITE_PACKAGES_DIR/"
          echo "App files copied to $SITE_PACKAGES_DIR"

    - task: ArchiveFiles@2
      displayName: 'Archive site_packages (with app files) for Deployment'
      inputs:
        rootFolderOrFile: '$(System.DefaultWorkingDirectory)/${{ parameters.projectPath }}/site_packages'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '${{ parameters.archiveFileName }}'
        replaceExistingArchive: true

    - task: PublishPipelineArtifact@1
      displayName: 'Publish Artifact: ${{ parameters.artifactName }}'
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)'
        artifact: '${{ parameters.artifactName }}'
        publishLocation: 'pipeline'
