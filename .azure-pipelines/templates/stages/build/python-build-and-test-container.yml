# python-build-and-test.yml
parameters:
  - name: pythonVersion
    type: string
    default: '3.11'

  - name: requirementsFile
    type: string
    default: 'requirements.txt'

  - name: coverageReportPath
    type: string
    default: 'coverage.xml'

  - name: testResultsPath
    type: string
    default: 'junit/test-results.xml'

  - name: archiveFileName
    type: string
    default: '$(Build.ArtifactStagingDirectory)/$(Build.SourceVersion).zip'

  - name: artifactName
    type: string
    default: 'Build-Drop'

  - name: projectPath
    type: string
    default: '.'
    # Path to the project root where requirements.txt is located

  - name: archiveSourcePath
    type: string
    default: '.'

  - name: archiveExclusions
    type: object
    default:
      - '**/.azure-pipelines/**'
      - '**/.github/**'
      - '**/.git/**'
      - '**/__pycache__/**'
      - '**/*.pyc'
      - '**/.pytest_cache/**'
      - '**/.coverage'
      - '**/venv/**'
      - '**/node_modules/**'

  - name: dockerfilePath
    type: string
    default: '.'
    # Directory where Dockerfile is located (root or subfolder)

  - name: dockerfileName
    type: string
    default: 'Dockerfile'
    # Name of the Dockerfile (e.g., Dockerfile, Dockerfile.prod, Dockerfile.dev)

  - name: dockerBuildContext
    type: string
    default: '.'

  - name: dockerTags
    type: string
    default: 'latest'


stages:
- stage: BuildStage
  displayName: "Stage 2 - Build & Test"
  jobs:
  - job: BuildJob
    displayName: Build & Test
    steps:
    - checkout: self
      fetchDepth: 1

    - task: UsePythonVersion@0
      displayName: Use Python ${{ parameters.pythonVersion }}
      inputs:
        versionSpec: ${{ parameters.pythonVersion }}

    - task: Bash@3
      displayName: Install Application Dependencies
      inputs:
        targetType: inline
        script: |
          set -e
          PROJECT_PATH="${{ parameters.projectPath }}"
          REQUIREMENTS_FILE="$PROJECT_PATH/${{ parameters.requirementsFile }}"
          if [ ! -d "$PROJECT_PATH/venv" ]; then
            python -m venv "$PROJECT_PATH/venv"
          fi
          # Activate the venv and install using its pip to ensure correct Python/pip pairing
          source "$PROJECT_PATH/venv/bin/activate"
          python -m pip install --upgrade pip
          echo "Installing dependencies from: $REQUIREMENTS_FILE into venv"
          if [ -f "$REQUIREMENTS_FILE" ]; then
            python -m pip install -r "$REQUIREMENTS_FILE"
          else
            echo "ERROR: Requirements file not found at $REQUIREMENTS_FILE"
            exit 1
          fi

    - bash: |
        # expose filenames for Publish tasks (basename evaluated by shell)
        testResultsFileName=$(basename "${{ parameters.testResultsPath }}")
        coverageFileName=$(basename "${{ parameters.coverageReportPath }}")
        echo "##vso[task.setvariable variable=testResultsFileName]$testResultsFileName"
        echo "##vso[task.setvariable variable=coverageFileName]$coverageFileName"
      displayName: 'Set test and coverage filenames'

    - task: Bash@3
      displayName: Run Pytest with Coverage (gracefully handle no tests)
      inputs:
        targetType: inline
        script: |
          set -e
          PROJECT_PATH="${{ parameters.projectPath }}"
          mkdir -p "$(Build.ArtifactStagingDirectory)"
          if [ ! -d "$PROJECT_PATH/venv" ]; then
            python3 -m venv "$PROJECT_PATH/venv"
          fi
          source "$PROJECT_PATH/venv/bin/activate"
          pip install pytest pytest-cov
          echo "Running pytest from $PROJECT_PATH"
          pytest -q --junitxml="$(Build.ArtifactStagingDirectory)/$(testResultsFileName)" \
            --cov="$PROJECT_PATH" --cov-report=xml:"$(Build.ArtifactStagingDirectory)/$(coverageFileName)" || exit_code=$?
          if [ "${exit_code:-0}" -eq 5 ]; then
            echo "No tests collected"
            echo '<testsuite name="no-tests" tests="0" errors="0" failures="0" skipped="0"></testsuite>' > "$(Build.ArtifactStagingDirectory)/$(testResultsFileName)"
            echo '<?xml version="1.0"?><coverage></coverage>' > "$(Build.ArtifactStagingDirectory)/$(coverageFileName)"
          elif [ "${exit_code:-0}" -ne 0 ]; then
            echo "Pytest failed with exit code ${exit_code}"
            exit ${exit_code}
          fi

    - task: PublishTestResults@2
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '$(Build.ArtifactStagingDirectory)/$(testResultsFileName)'
        failTaskOnFailedTests: true
      condition: succeededOrFailed()
      displayName: 'Publish Test Results to Azure DevOps'

    - task: PublishCodeCoverageResults@2
      inputs:
        codeCoverageTool: 'Cobertura'
        summaryFileLocation: '$(Build.ArtifactStagingDirectory)/$(coverageFileName)'
      condition: succeededOrFailed()
      displayName: 'Publish Code Coverage to Azure DevOps'

    - task: Bash@3
      displayName: 'Collect test and coverage artifacts (ensure names)'
      inputs:
        targetType: inline
        script: |
          mkdir -p "$(Build.ArtifactStagingDirectory)"
          echo "Artifacts in $(Build.ArtifactStagingDirectory):"
          ls -la "$(Build.ArtifactStagingDirectory)" || true

    - task: Bash@3
      displayName: 'Resolve Dockerfile Path'
      inputs:
        targetType: inline
        script: |
          set -e
          DOCKERFILE_DIR="${{ parameters.dockerfilePath }}"
          DOCKERFILE_NAME="${{ parameters.dockerfileName }}"
          DOCKERFILE_FULL_PATH="$DOCKERFILE_DIR/$DOCKERFILE_NAME"
          
          echo "Looking for Dockerfile at: $DOCKERFILE_FULL_PATH"
            
          if [ ! -f "$DOCKERFILE_FULL_PATH" ]; then
            echo "ERROR: Dockerfile not found at $DOCKERFILE_FULL_PATH"
            echo "Available files in $DOCKERFILE_DIR:"
            ls -la "$DOCKERFILE_DIR" || echo "Directory does not exist"
            exit 1
          fi
            
          echo "Found Dockerfile at: $DOCKERFILE_FULL_PATH"
          echo "##vso[task.setvariable variable=RESOLVED_DOCKERFILE;isOutput=true]$DOCKERFILE_FULL_PATH"
        name: ResolveDockerfile

    - task: Bash@3
      displayName: 'Docker Image Build'
      condition: succeeded()
      env:
        DOCKERFILE_PATH: $(ResolveDockerfile.RESOLVED_DOCKERFILE)
        BUILD_CONTEXT: ${{ parameters.dockerBuildContext }}
        DOCKER_TAGS: ${{ parameters.dockerTags }}
      inputs:
        targetType: inline
        script: |
          set -e
          IMAGE_TAG="build-image:${DOCKER_TAGS}-$(Build.BuildId)"
          echo "Build context: $BUILD_CONTEXT"
            
          docker build -f "$DOCKERFILE_PATH" -t "$IMAGE_TAG" "$BUILD_CONTEXT"
            
          echo "Saving Docker image to artifact staging directory"
          mkdir -p "$(Build.ArtifactStagingDirectory)"
          docker save -o "$(Build.ArtifactStagingDirectory)/image.tar" "$IMAGE_TAG"
            
          echo "Docker image saved as: $(Build.ArtifactStagingDirectory)/image.tar"

    - task: ArchiveFiles@2
      displayName: 'Archive Project Files for Deployment'
      inputs:
        rootFolderOrFile: '$(System.DefaultWorkingDirectory)/${{ parameters.projectPath }}'
        includeRootFolder: true
        archiveType: 'zip'
        archiveFile: '${{ parameters.archiveFileName }}'
        replaceExistingArchive: true

    - task: PublishPipelineArtifact@1
      displayName: 'Publish Artifact: ${{ parameters.artifactName }}'
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)'
        artifact: '${{ parameters.artifactName }}'
        publishLocation: 'pipeline'