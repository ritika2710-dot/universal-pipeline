# templates/collect-logs-stage.yaml
parameters:
  - name: stageName
    type: string
    default: 'CollectLogsStage'

  - name: stageDisplayName
    type: string
    default: 'Collect & Publish Run Logs (ZIP)'

  # - name: dependsOnStages
  #   type: object
  #   default: []

  - name: condition
    type: string
    default: 'succeededOrFailed()'

  - name: jobName
    type: string
    default: 'CollectLogsJob'

  - name: jobDisplayName
    type: string
    default: 'Collect logs'

  - name: logUniversalFeedName
    type: string
    default: ''

  - name: logsPackageName
    type: string
    default: 'pipeline-logs'

  - name: logsArtifactName
    type: string
    default: 'run-logs'

  - name: packageDescription
    type: string
    default: 'Pipeline logs for build'

  - name: dependsOn
    type: object
    default: 
      - 'ReleaseStage'

stages:
- stage: ${{ parameters.stageName }}
  displayName: ${{ parameters.stageDisplayName }}
  # dependsOn: ${{ parameters.dependsOn }}
  # condition: ${{ parameters.condition }}
  jobs:
    - job: ${{ parameters.jobName }}
      displayName: ${{ parameters.jobDisplayName }}
      condition: ${{ parameters.condition }}
      steps:
        - pwsh: |
            $orgUrl  = "$(System.CollectionUri)"
            $project = "$(System.TeamProject)"
            $buildId = "$(Build.BuildId)"
            $uri  = "$orgUrl$project/_apis/build/builds/$buildId/logs?api-version=7.1"
            $out  = "$(Pipeline.Workspace)/run-logs-$buildId.zip"

            Write-Host "Downloading logs ZIP for build $buildId"
            $headers = @{
              "Authorization" = "Bearer $(System.AccessToken)"
              "Accept"        = "application/zip"
            }

            Invoke-RestMethod -Method GET -Uri $uri -Headers $headers -OutFile $out
            Write-Host "Saved $out"

            # Prepare directory for Universal Package
            $pkgDir = "$(Build.ArtifactStagingDirectory)/universal-logs-package"
            New-Item -ItemType Directory -Force -Path $pkgDir | Out-Null
            Copy-Item $out -Destination (Join-Path $pkgDir "run-logs-$buildId.zip") -Force
          displayName: "Download logs ZIP for this run"

        - task: UniversalPackages@0
          displayName: 'Publish Pipeline Logs Universal Package'
          condition: ${{ parameters.condition }}
          inputs:
            command: 'publish'
            feedsToUse: 'internal'
            publishDirectory: '$(Build.ArtifactStagingDirectory)/universal-logs-package'
            vstsFeedPublish: '${{ parameters.logUniversalFeedName }}'
            vstsFeedPackagePublish: '${{ parameters.logsPackageName }}'
            versionOption: 'custom'
            versionPublish: '1.0.$(Build.BuildId)'
            packagePublishDescription: '${{ parameters.packageDescription }}'